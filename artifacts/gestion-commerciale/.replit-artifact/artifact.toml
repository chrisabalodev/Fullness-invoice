kind = "web"
previewPath = "/"
title = "Gestion Commerciale"
version = "1.0.0"
id = "artifacts/gestion-commerciale"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21621

[services.development]
run = "pnpm --filter @workspace/gestion-commerciale run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gestion-commerciale", "run", "build" ]
publicDir = "artifacts/gestion-commerciale/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21621"
BASE_PATH = "/"
